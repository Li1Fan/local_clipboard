<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共享剪贴板</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: #333;
        }

        /* 顶部导航栏 */
        .navbar {
            background: linear-gradient(135deg, #4096ff, #1677ff);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.3);
        }

        .navbar h1 {
            margin: 0;
            font-size: 20px;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .navbar a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 14px;
            padding: 5px 12px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* 主体 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 16px;
        }

        /* 卡片 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .card h2 {
            margin: 0 0 14px 0;
            font-size: 15px;
            color: #666;
            font-weight: 500;
        }

        /* 文本框 */
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            font-size: 15px;
            line-height: 1.6;
            border: 1.5px solid #d0dff5;
            border-radius: 8px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            overflow: hidden;
        }

        textarea:focus {
            border-color: #1677ff;
        }

        /* 按钮组 */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        button {
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4096ff, #1677ff);
            color: white;
            box-shadow: 0 2px 8px rgba(22, 119, 255, 0.35);
        }

        .btn-default {
            background: #f0f4f8;
            color: #555;
            border: 1px solid #dde5f0;
        }

        .btn-danger {
            background: #fff1f0;
            color: #ff4d4f;
            border: 1px solid #ffccc7;
        }

        button:hover {
            opacity: 0.85;
        }

        /* 剪贴板展示区 */
        .clipboard-display {
            position: relative;
        }

        .clipboard-display textarea {
            background: #f8fbff;
            color: #333;
            border-color: #e0eaff;
            min-height: 80px;
        }

        /* 空状态 */
        .empty-hint {
            text-align: center;
            padding: 30px 0;
            color: #bbb;
            font-size: 14px;
        }

        .empty-hint .empty-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        /* 复制成功提示 */
        #copy-toast {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <h1>📋 共享剪贴板</h1>
        {% if fileshare_url %}
        <a href="{{ fileshare_url }}" target="_blank">📁 文件共享站</a>
        {% endif %}
    </div>

    <div class="container">
        <!-- 发送区 -->
        <div class="card">
            <h2>发送内容</h2>
            <form method="POST" id="main-form">
                <textarea id="message" name="message" placeholder="输入要共享的内容…" oninput="autoResize(this)"></textarea>
                <input type="hidden" id="clear" name="clear" value="0">
                <div class="btn-row">
                    <button type="submit" class="btn-primary">📤 发送</button>
                    <button type="button" class="btn-default" onclick="location.reload()">🔄 刷新</button>
                    <button type="button" class="btn-default" onclick="window.open('/text', '_blank')">🕘 历史记录</button>
                    <button type="button" class="btn-danger" onclick="clearAll()">🗑 清空历史</button>
                </div>
            </form>
        </div>

        <!-- 剪贴板内容 -->
        <div class="card">
            <h2>剪贴板内容</h2>
            {% if messages %}
            <div class="clipboard-display">
                <textarea id="message_list" readonly oninput="autoResize(this)">{{ messages }}</textarea>
                <div class="btn-row">
                    <button type="button" class="btn-primary" onclick="copyContent()">📄 一键复制</button>
                </div>
            </div>
            {% else %}
            <div class="empty-hint">
                <div class="empty-icon">📭</div>
                <div>剪贴板为空，发送内容后会显示在这里</div>
            </div>
            {% endif %}
        </div>
    </div>

    <div id="copy-toast">已复制到剪贴板 ✓</div>

    <script>
        // 自适应高度
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.max(el.scrollHeight, 120) + 'px';
        }

        // 页面加载时初始化高度
        window.addEventListener('load', () => {
            document.querySelectorAll('textarea').forEach(t => autoResize(t));
        });

        // 清空
        function clearAll() {
            if (!confirm('确定清空剪贴板和历史记录？')) return;
            document.getElementById('clear').value = '1';
            document.getElementById('message').value = '';
            document.getElementById('main-form').submit();
        }

        // 复制
        function copyContent() {
            const el = document.getElementById('message_list');
            if (!el || !el.value) return;
            const text = el.value;

            // 尝试新版 API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast();
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        // 兼容方案
        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) showToast();
            } catch (err) {
                alert('复制失败，请手动选中复制');
            }
            document.body.removeChild(ta);
        }

        function showToast() {
            const toast = document.getElementById('copy-toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1800);
        }
    </script>
</body>

</html>
